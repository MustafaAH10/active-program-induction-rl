services:
  orchestrator:
    image: python:3.12-slim
    working_dir: /workspace
    volumes: [".:/workspace"]
    command: sh -c "pip install -r apps/orchestrator/requirements.txt && PYTHONPATH=apps/orchestrator uvicorn skyfoundry.main:app --host 0.0.0.0 --port 8000"
    ports: ["8000:8000"]
    environment:
      AGENT_PROVIDER: scripted
      ENABLE_LIVE_AGENTS: "false"
      ENABLE_TRELLIS: "false"
